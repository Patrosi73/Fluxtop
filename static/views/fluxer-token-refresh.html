<!doctype html>
<meta charset="utf-8" />

<head>
    <title>Update Fluxer Token</title>

    <link rel="stylesheet" href="./common.css" type="text/css" />

    <style>
        body {
            height: 100vh;

            padding: 1.5em;
            padding-bottom: 1em;

            border: 1px solid var(--fg-semi-trans);
            border-top: none;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h1 {
            margin: 0.4em 0 0;
        }

        p {
            margin: 1em 0 2em;
            color: var(--fg-secondary);
        }

        form {
            display: grid;
            gap: 1em;
            margin: 0;
        }

        label {
            position: relative;
            display: flex;
            justify-content: space-between;
            gap: 1em;
        }

        label div {
            display: grid;
            gap: 0.2em;
        }

        label h2 {
            margin: 0;
            font-weight: normal;
            font-size: 1.1rem;
            line-height: 1rem;
        }

        label span {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--fg-secondary);
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
        }

        #show-wrap {
            display: flex;
            gap: 0.4em;
            align-items: center;
            color: var(--fg-secondary);
        }

        #buttons {
            display: flex;
            justify-content: end;
            gap: 0.5em;
            margin-top: auto;
        }

        button {
            padding: 0.6em;
            background: #666;
            color: white;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: 200ms filter;
        }

        button:hover {
            filter: brightness(0.8);
        }

        #submit {
            background: green;
        }
    </style>
</head>

<body>
    <h1>Token expired</h1>
    <p>Your Fluxer token is no longer valid. Paste a new token to continue.</p>

    <form>
        <label>
            <div>
                <h2>Fluxer Token</h2>
                <span>Only this value will be updated.</span>
            </div>
            <input type="password" name="fluxerToken" required />
        </label>
        <label id="show-wrap">
            <input type="checkbox" id="show-token" />
            Show Token
        </label>
    </form>
    <div id="buttons">
        <button id="cancel">Cancel</button>
        <button id="submit">Save Token</button>
    </div>
</body>

<script>
    const tokenInput = document.querySelector('input[name="fluxerToken"]');
    const showToken = document.getElementById("show-token");

    showToken.onchange = () => {
        tokenInput.type = showToken.checked ? "text" : "password";
    };

    cancel.onclick = () => console.info("cancel");
    submit.onclick = e => {
        const form = document.querySelector("form");
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        console.info("form:" + JSON.stringify(data));
        e.preventDefault();
    };
</script>
