<!doctype html>
<meta charset="utf-8" />

<head>
    <title>Fluxtop Setup</title>

    <link rel="stylesheet" href="./common.css" type="text/css" />

    <style>
        body {
            height: 100vh;

            padding: 1.5em;
            padding-bottom: 1em;

            border: 1px solid var(--fg-semi-trans);
            border-top: none;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        select {
            background: var(--bg);
            color: var(--fg);
            padding: 0.3em;
            margin: -0.3em;
            border-radius: 6px;
        }

        h1 {
            margin: 0.4em 0 0;
        }

        p {
            margin: 1em 0 2em;
        }

        form {
            display: grid;
            gap: 1em;
            margin: 0;
        }

        label {
            position: relative;
            display: flex;
            justify-content: space-between;
            gap: 1em;
            align-items: center;
        }

        label:has(input[type="checkbox"]),
        select {
            cursor: pointer;
        }

        label:not(:last-child)::after {
            content: "";
            position: absolute;
            bottom: -10px;
            width: 100%;
            height: 1px;
            background-color: var(--fg-secondary);
            opacity: 0.5;
        }

        label div {
            display: grid;
            gap: 0.2em;
        }

        label h2 {
            margin: 0;
            font-weight: normal;
            font-size: 1.1rem;
            line-height: 1rem;
        }

        label span {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--fg-secondary);
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            max-width: 220px;
            box-sizing: border-box;
            padding: 0.45em 0.6em;
            border: 1px solid var(--fg-semi-trans);
            border-radius: 4px;
            background: transparent;
            color: var(--fg);
            outline: none;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--link);
        }

        #buttons {
            display: flex;
            justify-content: end;
            gap: 0.5em;
            margin-top: auto;
        }

        button {
            padding: 0.6em;
            background: red;
            color: white;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: 200ms filter;
        }

        button:hover {
            filter: brightness(0.8);
        }

        #submit {
            background: green;
        }
    </style>
</head>

<body>
    <h1>Welcome to Fluxtop</h1>
    <p>Let's configure your experience!</p>

    <form>
        <label>
            <div>
                <h2>Fluxer Token</h2>
                <span>This will be used to authenticate with the Fluxer API. To obtain one, please read the repository README.</span>
            </div>
            <input type="password" name="fluxerToken" />
        </label>

        <label>
            <div>
                <h2>Start with System</h2>
                <span>Automatically open Fluxtop when your computer starts</span>
            </div>
            <input type="checkbox" name="autoStart" />
        </label>

        <label>
            <div>
                <h2>Import Settings</h2>
                <span>Import Settings from existing Vencord install (if found)</span>
            </div>
            <input type="checkbox" name="importSettings" checked />
        </label>

        <label>
            <div>
                <h2>Minimise to Tray</h2>
                <span>Minimise to Tray when closing</span>
            </div>
            <input type="checkbox" name="minimizeToTray" checked />
        </label>
    </form>
    <div id="buttons">
        <button id="cancel">Quit</button>
        <button id="submit">Submit</button>
    </div>
</body>

<script>
    cancel.onclick = () => console.info("cancel");
    submit.onclick = e => {
        const form = document.querySelector("form");
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        console.info("form:" + JSON.stringify(data));
        e.preventDefault();
    };
</script>
